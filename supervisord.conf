[supervisord]
nodaemon=true

[program:label-studio]
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
directory=/opt/apps/label-studio
command=label-studio

[program:mlflow]
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
directory=/opt/apps/mlflow
command=mlflow server --port 8081 --static-prefix /app/mlflow --x-frame-options NONE

[program:nexus]
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
directory=/opt/apps/nexus
command=uv run fastapi run --port 8079 nexus.py

[program:gateway]
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
directory=/opt/apps/nexus
command=uv run gunicorn --bind :9090 'gateway:app'

[program:caddy]
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
directory=/opt/apps/caddy
environment=XDG_DATA_HOME=/usr/local/share
command=caddy run