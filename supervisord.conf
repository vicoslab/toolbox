[supervisord]
nodaemon=true

[program:label-studio]
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
command=label-studio

[program:mlflow]
stdout_logfile=/dev/stdout
stderr_logfile=/dev/stderr
stdout_logfile_maxbytes=0
stderr_logfile_maxbytes=0
command=mlflow server --port 8081 --x-frame-options NONE