<!DOCTYPE html>
<html>

<head>
    <title>{% block title %}{% endblock %} - ViCoS</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>

<body>


    <nav>
        <h2>ViCoS Toolbox</h2>
        <a href="/label" {% if request.endpoint=='label' %}aria-current="page" {% endif %}>Labeling</a>
        <a href="/dashboard" {% if request.endpoint=='dashboard' %}aria-current="page" {% endif %}>Experiments</a>
        <a href="/models" {% if request.endpoint=='models' %}aria-current="page" {% endif %}>Models</a>
        <a href="/optimize" {% if request.endpoint=='optimize' %}aria-current="page" {% endif %}>Camera Optimizer</a>
        <a href="/task/logs" id="status"></a>
    </nav>

    <main>
        {% block content %}{% endblock %}
    </main>

    <script src="/static/status.js"></script>
</body>

</html>
